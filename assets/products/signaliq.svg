<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Transparent background - no fill -->
  
  <!-- Bold candlestick chart - 3 candles showing upward trend -->
  
  <!-- Candle 1 (left) - Green/Bull -->
  <rect x="8" y="32" width="12" height="24" fill="#16A34A" rx="2"/>
  <line x1="14" y1="32" x2="14" y2="24" stroke="#16A34A" stroke-width="5" stroke-linecap="round"/>
  <line x1="14" y1="56" x2="14" y2="60" stroke="#16A34A" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Candle 2 (center) - Green/Bull - taller -->
  <rect x="26" y="20" width="12" height="36" fill="#16A34A" rx="2"/>
  <line x1="32" y1="20" x2="32" y2="12" stroke="#16A34A" stroke-width="5" stroke-linecap="round"/>
  <line x1="32" y1="56" x2="32" y2="60" stroke="#16A34A" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Candle 3 (right) - Green/Bull - tallest -->
  <rect x="44" y="12" width="12" height="44" fill="#16A34A" rx="2"/>
  <line x1="50" y1="12" x2="50" y2="4" stroke="#16A34A" stroke-width="5" stroke-linecap="round"/>
  <line x1="50" y1="56" x2="50" y2="60" stroke="#16A34A" stroke-width="5" stroke-linecap="round"/>
</svg>
